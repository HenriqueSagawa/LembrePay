services:
  db:
    image: postgres:16-alpine
    container_name: lembrepay-db
    environment:
      POSTGRES_DB: lembrepay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lembrepay"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: lembrepay-mailhog
    ports:
      - "8025:8025" # UI
      - "1025:1025" # SMTP

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lembrepay-api
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/lembrepay"
      JWT_SECRET: "dev-secret-change-me"
      SMTP_HOST: "mailhog"
      SMTP_PORT: "1025"
      SMTP_USER: "dev"
      SMTP_PASS: "dev"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  db_data:


